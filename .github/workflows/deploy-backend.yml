name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Zip server for deployment
        run: |
          cd server
          zip -r ../deploy-backend.zip . -x "*.git*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: study-helper-api123
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy-backend.zip

      - name: Set App Service environment variables
        uses: azure/appservice-settings@v1
        with:
          app-name: study-helper-api123
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          app-settings-json: |
            [
              { "name": "AZURE_STORAGE_CONNECTION_STRING",        "value": "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}",        "slotSetting": false },
              { "name": "AZURE_STORAGE_CONTAINER_NAME",           "value": "${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}",           "slotSetting": false },
              { "name": "AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT",   "value": "${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}",   "slotSetting": false },
              { "name": "AZURE_DOCUMENT_INTELLIGENCE_KEY",        "value": "${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY }}",        "slotSetting": false },
              { "name": "AZURE_OPENAI_ENDPOINT",                  "value": "${{ secrets.AZURE_OPENAI_ENDPOINT }}",                  "slotSetting": false },
              { "name": "AZURE_OPENAI_KEY",                       "value": "${{ secrets.AZURE_OPENAI_KEY }}",                       "slotSetting": false },
              { "name": "AZURE_OPENAI_DEPLOYMENT",                "value": "${{ secrets.AZURE_OPENAI_DEPLOYMENT }}",                "slotSetting": false },
              { "name": "AZURE_OPENAI_API_VERSION",               "value": "${{ secrets.AZURE_OPENAI_API_VERSION }}",               "slotSetting": false }
            ]
